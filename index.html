<!DOCTYPE html>
<html>
<head>
  <title>Forest Panel</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="sidebar">
  <h2>🌲 Forest</h2>
  <button onclick="showTab('dash')">Dashboard</button>
  <button onclick="showTab('control')">Control</button>
  <button onclick="showTab('console_tab')">Console</button>
  <button onclick="showTab('ai')">AI</button>
</div>

<div class="main">

<div id="dash" class="tab">
  <h1>⚡ Dashboard</h1>

  <div class="grid">
    <div class="card glow">
      <h3>Status</h3>
      <p id="status">Loading...</p>
    </div>

    <div class="card glow">
      <h3>Players</h3>
      <p id="players">0</p>
    </div>
  </div>
</div>

<div id="control" class="tab" style="display:none;">
  <h1>🎮 Control Panel</h1>

  <div class="card center">
    <button class="btn green" onclick="sendAction('start')">Start</button>
    <button class="btn red" onclick="sendAction('stop')">Stop</button>
    <button class="btn blue" onclick="sendAction('restart')">Restart</button>
  </div>
</div>

<div id="console_tab" class="tab" style="display:none;">
  <h1>💻 Console</h1>
  <div class="card console">
    <pre id="console"></pre>
  </div>
</div>

<div id="ai" class="tab" style="display:none;">
  <h1>🤖 AI Assistant</h1>

  <div class="card">
    <input id="ai_input" placeholder="Ask anything...">
    <button class="btn blue" onclick="askAI()">Ask</button>
    <p id="ai_output"></p>
  </div>
</div>

</div>

<script src="/script.js"></script>
</body>
</html>
