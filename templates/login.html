<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forest Panel · Login</title>
  <link rel="stylesheet" href="/login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-wrap">

  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <span class="logo-icon">🌲</span>
      <span class="logo-text">Forest Panel</span>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Use <code>?dashboard</code> in Discord to get your login token.</p>

    <!-- Form -->
    <div class="field-group">
      <label class="field-label">Username</label>
      <input
        class="field-input"
        id="username"
        type="text"
        placeholder="your discord username"
        autocomplete="username"
        spellcheck="false"
      />
    </div>

    <div class="field-group">
      <label class="field-label">One-time Token</label>
      <input
        class="field-input mono"
        id="token"
        type="text"
        placeholder="paste token from Discord"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="field-hint">Tokens expire in 2 minutes and can only be used once.</div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <span id="loginBtnText">Login to Panel</span>
      <span id="loginSpinner" class="spinner" style="display:none"></span>
    </button>

    <div class="login-footer">
      <span class="footer-dot online"></span>
      Forest Panel · Secure token login
    </div>

  </div>

</div>

<script>
  // Auto-fill from URL params (when bot sends direct link)
  const params = new URLSearchParams(location.search);
  if (params.get('user'))  document.getElementById('username').value = params.get('user');
  if (params.get('token')) document.getElementById('token').value   = params.get('token');

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const token    = document.getElementById('token').value.trim();
    const errBox   = document.getElementById('errorBox');
    const btn      = document.getElementById('loginBtn');
    const btnText  = document.getElementById('loginBtnText');
    const spinner  = document.getElementById('loginSpinner');

    errBox.textContent = '';
    errBox.style.display = 'none';

    if (!username || !token) {
      showError('Please enter both your username and token.');
      return;
    }

    // Loading state
    btn.disabled    = true;
    btnText.style.display  = 'none';
    spinner.style.display  = 'inline-block';

    try {
      const res  = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, token }),
      });
      const data = await res.json();

      if (data.ok) {
        btnText.textContent   = '✓ Logging in...';
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        btn.style.background  = 'linear-gradient(135deg,#00e5a0,#00b37a)';
        btn.style.color       = '#000';
        setTimeout(() => { window.location.href = '/'; }, 400);
      } else {
        showError(data.error || 'Login failed.');
        reset();
      }
    } catch (e) {
      showError('Connection error. Is the panel running?');
      reset();
    }
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent    = msg;
    box.style.display  = 'block';
  }

  function reset() {
    const btn     = document.getElementById('loginBtn');
    const btnText = document.getElementById('loginBtnText');
    const spinner = document.getElementById('loginSpinner');
    btn.disabled          = false;
    btnText.style.display = 'inline';
    btnText.textContent   = 'Login to Panel';
    spinner.style.display = 'none';
  }
</script>
</body>
</html>
